services:
  - type: web
    name: fisio-backend
    runtime: node
    branch: etapa-32-pre-prod
    rootDir: apps/backend
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: npm run migration:run
    startCommand: npm run start:prod
    healthCheckPath: /api/health/live
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_MIGRATIONS_RUN
        value: "false"
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: DB_POOL_MAX
        value: "8"
      - key: DB_POOL_MIN
        value: "0"
      - key: DB_POOL_IDLE_TIMEOUT_MS
        value: "10000"
      - key: DB_POOL_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "30000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REFRESH_SECRET
        generateValue: true
      - key: REFRESH_EXPIRES_IN
        value: 30d
      - key: INVITE_SECRET
        generateValue: true
      - key: PATIENT_INVITE_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: TRUST_PROXY
        value: "true"
      - key: APP_VERSION
        value: etapa-32-pre-prod
      - key: CONSENT_TERMS_VERSION
        value: terms-hml-2026-06-09
      - key: CONSENT_PRIVACY_VERSION
        value: privacy-hml-2026-06-09
      - key: CONSENT_RESEARCH_VERSION
        value: research-hml-2026-06-09
      - key: CONSENT_AI_VERSION
        value: ai-hml-2026-06-09
      - key: CONSENT_PROFESSIONAL_LGPD_VERSION
        value: professional-lgpd-hml-2026-06-09
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "60"
      - key: LOCKOUT_MAX_ATTEMPTS
        value: "5"
      - key: LOCKOUT_WINDOW_MIN
        value: "15"
      - key: LOCKOUT_DURATION_MIN
        value: "30"
      - key: REDIS_URL
        sync: false
      - key: REDIS_KEY_PREFIX
        value: fisio-app
      - key: CACHE_TTL_SECONDS
        value: "60"
      - key: CACHE_HEAVY_TTL_SECONDS
        value: "120"
      - key: ALLOW_ADMIN_REGISTRATION
        value: "false"
      - key: MASTER_ADMIN_EMAILS
        sync: false
      - key: MASTER_ADMIN_PERMISSIONS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_LAUDO_MODEL
        value: gpt-5.5
      - key: OPENAI_LAUDO_REFERENCE_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_EXAM_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_ATIVIDADE_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_CHARLES_MODEL
        value: gpt-5.5
      - key: OPENAI_EXAM_AI_ENABLED
        value: "true"
      - key: OPENAI_LAUDO_WEB_REFERENCES_ENABLED
        value: "true"
      - key: OPENAI_CHARLES_AI_ENABLED
        value: "true"
      - key: OPENAI_LAUDO_TIMEOUT_MS
        value: "15000"
      - key: OPENAI_LAUDO_REFERENCES_TIMEOUT_MS
        value: "8000"
      - key: OPENAI_EXAM_TIMEOUT_MS
        value: "30000"
      - key: OPENAI_ATIVIDADE_TIMEOUT_MS
        value: "8000"
      - key: OPENAI_CHARLES_TIMEOUT_MS
        value: "12000"
      - key: EXPO_ACCESS_TOKEN
        sync: false
      - key: SENTRY_REQUIRED
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: paciente-exames

  - type: web
    name: fisio-frontend
    runtime: static
    branch: etapa-32-pre-prod
    rootDir: apps/mobile
    buildCommand: npm ci && npm run build:web
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: EXPO_PUBLIC_API_URL
        sync: false
      - key: EXPO_PUBLIC_MASTER_ADMIN_EMAILS
        sync: false
      - key: EXPO_PUBLIC_ENABLE_SPEECH_TO_TEXT
        value: "true"
      - key: EXPO_PUBLIC_SENTRY_DSN
        sync: false
      - key: EXPO_PUBLIC_APP_ENV
        value: hml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

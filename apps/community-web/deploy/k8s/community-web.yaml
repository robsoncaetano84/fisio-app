apiVersion: v1
kind: ConfigMap
metadata:
  name: synap-community-web-config
  labels:
    app.kubernetes.io/name: synap-community-web
    app.kubernetes.io/part-of: synap
data:
  NEXT_PUBLIC_COMMUNITY_URL: "https://community.synap.app"
  NEXT_PUBLIC_COMMUNITY_API_URL: "https://api.synap.app/api"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synap-community-web
  labels:
    app.kubernetes.io/name: synap-community-web
    app.kubernetes.io/part-of: synap
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: synap-community-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synap-community-web
        app.kubernetes.io/part-of: synap
    spec:
      containers:
        - name: community-web
          image: ghcr.io/synap/community-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: synap-community-web-config
          env:
            - name: COMMUNITY_API_URL
              valueFrom:
                configMapKeyRef:
                  key: NEXT_PUBLIC_COMMUNITY_API_URL
                  name: synap-community-web-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: synap-community-web
  labels:
    app.kubernetes.io/name: synap-community-web
    app.kubernetes.io/part-of: synap
spec:
  selector:
    app.kubernetes.io/name: synap-community-web
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synap-community-web
  labels:
    app.kubernetes.io/name: synap-community-web
    app.kubernetes.io/part-of: synap
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: community.synap.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: synap-community-web
                port:
                  name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: synap-community-web
  labels:
    app.kubernetes.io/name: synap-community-web
    app.kubernetes.io/part-of: synap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: synap-community-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
